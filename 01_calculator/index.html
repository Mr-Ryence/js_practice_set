<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Calculator</title>
     <link rel="stylesheet" href="style.css">
</head>

<body>
     <div class="container">
          <input type="text"  id="display">
          <div class="btn_container">
          <button class="btn" id="first" onclick=first()>1</button>
          <button class="btn" id="1" onclick="second()">2</button>
          <button class="btn" id="1" onclick="equal()">=</button>
          <button class="btn" id="1" onclick="third()">3</button>
          <button class="btn" id="1" onclick="fourth()">4</button>
          <button class="btn" id="1" onclick="add()">+</button>
          <button class="btn" id="1" onclick="fifth()">5</button>
          <button class="btn" id="1" onclick="sixth()">6</button>
          <button class="btn" id="1" onclick="sub()">-</button>
          <button class="btn" id="1" onclick="seventh()">7</button>
          <button class="btn" id="1" onclick="Eighth()">8</button>
          <button class="btn" id="1" onclick="multi()">*</button>
          <button class="btn" id="1" onclick="ninth()">9</button>
          <button class="btn" id="1" onclick="dot()">.</button>
          <button class="btn" id="1" onclick="Clear()">C</button>
          <button class="btn" id="1" onclick="zero()">0</button>
          <button class="btn" id="1" onclick="dblzero()">00</button>
          </div>
     </div>
     <script src="script.js">

     </script>
</body>

</html>
